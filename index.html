<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간 계산기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; padding: 24px; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
  .entries { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .row { display: flex; align-items: center; gap: 10px; }
  .index { font-size: 13px; color: #888; width: 20px; text-align: right; flex-shrink: 0; }
  .tc-input {
    font-size: 20px; font-weight: 600; font-family: 'Courier New', monospace;
    letter-spacing: 4px; width: 160px; padding: 10px 14px;
    border: 1px solid #ddd; border-radius: 8px; outline: none; color: #111;
  }
  .tc-input:focus { border-color: #888; }
  .parsed { font-size: 13px; color: #888; min-width: 120px; }
  .remove-btn {
    width: 28px; height: 28px; border: 1px solid #eee; border-radius: 6px;
    background: none; cursor: pointer; color: #aaa; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .remove-btn:hover { background: #f5f5f5; color: #555; }
  .actions { display: flex; gap: 8px; margin-bottom: 20px; }
  .btn {
    padding: 8px 16px; font-size: 14px; border: 1px solid #ddd;
    border-radius: 8px; background: none; cursor: pointer; color: #111;
  }
  .btn:hover { background: #f5f5f5; }
  .btn.primary { background: #111; color: #fff; border-color: transparent; }
  .btn.primary:hover { background: #333; }
  .result {
    background: #f7f7f7; border-radius: 12px; padding: 20px 24px; display: none;
  }
  .result-label { font-size: 13px; color: #888; margin-bottom: 6px; }
  .result-value { font-size: 36px; font-weight: 700; font-family: 'Courier New', monospace; letter-spacing: 2px; color: #111; margin-bottom: 4px; }
  .result-breakdown { font-size: 13px; color: #888; }
  .hint { font-size: 12px; color: #bbb; margin-top: 10px; }
</style>
</head>
<body>
<h2>시간 계산기 by 혜령&클로드</h2>
<div class="entries" id="entries"></div>
<div class="actions">
  <button class="btn" onclick="addRow()">+ 항목 추가</button>
  <button class="btn primary" onclick="calculate()">계산하기</button>
</div>
<div class="result" id="result"></div>
<p class="hint">형식: HHMMSS — 예) 001810 = 0시간 18분 10초</p>

<script>
let rows = [{ id: 1, val: '' }, { id: 2, val: '' }];
let nextId = 3;

function render() {
  const container = document.getElementById('entries');
  container.innerHTML = '';
  rows.forEach((row, i) => {
    const div = document.createElement('div');
    div.className = 'row';
    div.innerHTML = `
      <span class="index">${i + 1}</span>
      <input class="tc-input" id="inp-${row.id}" type="text" maxlength="6"
        placeholder="000000" value="${row.val}"
        oninput="updateVal(${row.id}, this.value)"
        onkeydown="handleKey(event, ${row.id})" />
      <span class="parsed">${parseLabel(row.val)}</span>
      ${rows.length > 1
        ? `<button class="remove-btn" onclick="removeRow(${row.id})">×</button>`
        : '<span style="width:28px"></span>'}
    `;
    container.appendChild(div);
  });
}

function parseLabel(v) {
  if (!v || v.length < 6) return '';
  const h = parseInt(v.slice(0,2)), m = parseInt(v.slice(2,4)), s = parseInt(v.slice(4,6));
  if (m >= 60 || s >= 60) return '⚠ 잘못된 형식';
  const parts = [];
  if (h) parts.push(`${h}시간`);
  if (m) parts.push(`${m}분`);
  if (s) parts.push(`${s}초`);
  return parts.length ? parts.join(' ') : '0초';
}

function updateVal(id, v) {
  v = v.replace(/\D/g, '').slice(0, 6);
  const r = rows.find(r => r.id === id);
  if (r) {
    r.val = v;
    render();
    setTimeout(() => {
      const el = document.getElementById(`inp-${id}`);
      if (el) { el.focus(); el.setSelectionRange(v.length, v.length); }
    }, 0);
  }
}

function handleKey(e, id) {
  if (e.key === 'Enter') {
    addRow();
    setTimeout(() => {
      const last = rows[rows.length - 1];
      document.getElementById(`inp-${last.id}`)?.focus();
    }, 0);
  }
}

function addRow() {
  rows.push({ id: nextId++, val: '' });
  render();
  setTimeout(() => document.getElementById(`inp-${rows[rows.length-1].id}`)?.focus(), 0);
}

function removeRow(id) {
  rows = rows.filter(r => r.id !== id);
  render();
}

function toSeconds(v) {
  if (!v || v.length < 6) return null;
  const h = parseInt(v.slice(0,2)), m = parseInt(v.slice(2,4)), s = parseInt(v.slice(4,6));
  if (m >= 60 || s >= 60) return null;
  return h * 3600 + m * 60 + s;
}

function calculate() {
  let total = 0, valid = 0;
  rows.forEach(r => {
    if (!r.val) return;
    const s = toSeconds(r.val);
    if (s !== null) { total += s; valid++; }
  });
  const res = document.getElementById('result');
  if (valid === 0) { res.style.display = 'none'; return; }
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  const fmt = n => String(n).padStart(2, '0');
  const parts = [];
  if (h) parts.push(`${h}시간`);
  if (m) parts.push(`${m}분`);
  if (s) parts.push(`${s}초`);
  res.style.display = 'block';
  res.innerHTML = `
    <p class="result-label">총 합계 (${valid}개 항목)</p>
    <p class="result-value">${fmt(h)}:${fmt(m)}:${fmt(s)}</p>
    <p class="result-breakdown">${parts.join(' ') || '0초'} · 총 ${total.toLocaleString()}초</p>
  `;
}

render();
</script>
</body>
</html>
